[mypy]
python_version = 3.10
files = metrics_petri
ignore_missing_imports = True
warn_unused_ignores = True
warn_redundant_casts = True
warn_unused_configs = True
no_implicit_optional = True
show_error_codes = True
pretty = True

[mypy-metrics_petri.pipeline.app]
ignore_errors = True

[mypy-metrics_petri.pipelinesam.dish_cropper]
ignore_errors = True

[mypy-metrics_petri.pipelinesam.image_metadata_gui]
ignore_errors = True
