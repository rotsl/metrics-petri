name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Extract version from release tag
        # Strips a leading 'v' so both 'v0.1.0' and '0.1.0' tags work
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "Building version: ${VERSION}"

      - name: Stamp version into metrics_petri/__init__.py
        run: |
          sed -i "s/__version__ = \".*\"/__version__ = \"${VERSION}\"/" metrics_petri/__init__.py
          grep '__version__' metrics_petri/__init__.py

      - name: Install build tools
        run: pip install --upgrade build

      - name: Build wheel and sdist
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
