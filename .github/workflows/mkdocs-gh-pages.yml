name: Deploy MkDocs to GitHub Pages

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual deploy (optional)'
        required: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install mkdocs and material theme
        run: |
          pip install mkdocs mkdocs-material

      - name: Prepare docs directory
        run: |
          mkdir -p docs
          cat <<EOF > docs/index.md
          # Metrics Petri Packages

          - [metrics-petri](readme/)
          - [metrics-petri Pipeline](pipelinesam/)
          - [Python Package](package/)
          EOF
          cp README.md docs/readme.md
          cp metrics_petri/pipelinesam/README.md docs/pipelinesam.md
          cp package.md docs/package.md
          cat <<EOF > mkdocs.yml
          site_name: Metrics Petri Packages
          site_url: https://rotsl.github.io/metrics-petri/
          nav:
            - Home: index.md
            - metrics-petri: readme.md
            - metrics-petri Pipeline: pipelinesam.md
            - Python Package: package.md
          extra:
            social:
              - icon: fontawesome/brands/github
                link: https://github.com/rotsl/metrics-petri
            footer: |
              <hr/>
              <div style='text-align:center;font-size:0.9em;'>
                Developed by <a href='https://github.com/rotsl/metrics-petri' target='_blank'>Rohan R</a> &mdash; <a href='https://github.com/rotsl/metrics-petri' target='_blank'>MIT</a>
              </div>
          extra_javascript: []
          extra_css: []
          markdown_extensions:
            - toc
            - tables
            - admonition
            - codehilite
            - footnotes
            - meta
            - attr_list
            - def_list
            - pymdownx.superfences
            - pymdownx.details
            - pymdownx.tabbed
            - pymdownx.emoji
            - pymdownx.tasklist
            - pymdownx.inlinehilite
            - pymdownx.magiclink
            - pymdownx.betterem
            - pymdownx.caret
            - pymdownx.mark
            - pymdownx.tilde
            - pymdownx.smartsymbols
            - pymdownx.keys
            - pymdownx.critic
            - pymdownx.progressbar
            - pymdownx.snippets
            - pymdownx.arithmatex
            - pymdownx.highlight
          EOF
      - name: Build documentation
        run: mkdocs build

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
