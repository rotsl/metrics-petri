name: Deploy MkDocs to GitHub Pages

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual deploy (optional)'
        required: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Configure GitHub Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.11'

      - name: Install package and documentation dependencies
        run: pip install -e ".[docs]" ruff

      - name: Add documentation footer
        run: |
          python <<'PY'
          from pathlib import Path

          config = Path("mkdocs.yml")
          footer = (
              "copyright: 'This project was designed and developed by "
              '<a href="https://github.com/rotsl">Rohan R</a> '
              "at The Sainsbury Laboratory, Norwich'"
          )
          lines = [
              line
              for line in config.read_text().splitlines()
              if not line.startswith("copyright:")
          ]
          lines.append(footer)
          config.write_text("\n".join(lines) + "\n")
          PY

      - name: Build documentation
        run: mkdocs build --strict

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: ./site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
