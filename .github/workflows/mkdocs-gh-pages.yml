name: Deploy MkDocs to GitHub Pages

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual deploy (optional)'
        required: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install mkdocs and material theme
        run: |
          pip install mkdocs mkdocs-material

      - name: Prepare docs directory
        run: |
          mkdir -p docs
          cp pipelinesam/README.md docs/pipelinesam.md
          cp pipeline/README.md docs/pipeline.md
          cp package.md docs/package.md
          cat <<EOF > mkdocs.yml
site_name: Metrics Petri Packages
nav:
  - Pipeline: pipeline.md
  - PipelineSAM: pipelinesam.md
  - Python Package: package.md
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/rotsl/metrics-petri
  footer: |
    <hr/>
    <div style='text-align:center;font-size:0.9em;'>
      Developed by <a href='https://github.com/rotsl/metrics-petri' target='_blank'>Rohan R</a> &mdash; <a href='https://github.com/rotsl/metrics-petri' target='_blank'>Apache 2.0</a>
    </div>
extra_javascript: []
extra_css: []
markdown_extensions:
  - toc
  - tables
  - admonition
  - codehilite
  - footnotes
  - meta
  - attr_list
  - def_list
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tabbed
  - pymdownx.emoji
  - pymdownx.tasklist
  - pymdownx.inlinehilite
  - pymdownx.magiclink
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.smartsymbols
  - pymdownx.keys
  - pymdownx.critic
  - pymdownx.progressbar
  - pymdownx.snippets
  - pymdownx.arithmatex
  - pymdownx.highlight
EOF
      - name: Build documentation
        run: mkdocs build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: gh-pages
          force_orphan: true
