name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      MPLCONFIGDIR: .mplconfig
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install system dependencies
        run: sudo apt-get install -y python3-tk
      - run: pip install -e ".[test,gui]"
      - run: ruff check .
      - run: mypy --python-version "${{ matrix.python-version }}" metrics_petri
      - run: pyright
      - run: metrics-petri doctor
      - run: pytest --cov=metrics_petri --cov-report=term-missing
      - run: bandit -c pyproject.toml -r metrics_petri
      - run: check-manifest --no-build-isolation
